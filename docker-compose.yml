services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-travel_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel_os_password}
      POSTGRES_DB: ${POSTGRES_DB:-travel_os}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - travel_os_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: travel-os-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - travel_os_redis_data:/data

volumes:
  travel_os_postgres_data:
  travel_os_redis_data:
